name: Trigger Docs Rebuild

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'repo-manifest.yml'
      - 'README.md'

jobs:
  trigger-rebuild:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger docs-source rebuild
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.DOCS_REBUILD_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/GitHEE-UMCU/docs-source/actions/workflows/rebuild-site.yml/dispatches" \
            -d '{"ref":"main"}'
