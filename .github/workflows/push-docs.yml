name: Trigger Docs Rebuild

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'repo-manifest.yml'
      - 'README.md'

jobs:
  trigger-rebuild:
    runs-on: ubuntu-latest

    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: GitHEE-UMCU

      - name: Trigger docs-source rebuild
        run: |
          curl -X POST \
            -H "Authorization: token ${{ steps.app-token.outputs.token }}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/GitHEE-UMCU/docs-source/actions/workflows/rebuild-site.yml/dispatches" \
            -d '{"ref":"main"}'
