name: Push Docs to Central Site

on:
  push:
    branches:
      - main
    paths:
      - 'docs/**'
      - 'repo-manifest.yml'
      - 'README.md'

jobs:
  push-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: GitHEE-UMCU

      - name: Checkout central docs site
        uses: actions/checkout@v4
        with:
          repository: GitHEE-UMCU/GitHEE-UMCU.github.io
          token: ${{ steps.app-token.outputs.token }}
          path: central-docs

      - name: Copy docs into central site
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          mkdir -p central-docs/docs/$REPO_NAME
          if [ -f README.md ]; then
            cp README.md central-docs/docs/$REPO_NAME/index.md
          fi
          if [ -d docs ]; then
            cp -r docs/. central-docs/docs/$REPO_NAME/
          fi

      - name: Copy manifest into central site
        run: |
          REPO_NAME="${{ github.event.repository.name }}"
          mkdir -p central-docs/manifests
          if [ -f repo-manifest.yml ]; then
            cp repo-manifest.yml central-docs/manifests/$REPO_NAME.yml
          fi

      - name: Commit and push to central site
        run: |
          cd central-docs
          git config user.name "GitHEE-UMCU Docs Bot"
          git config user.email "docs-bot@gitHEE-UMCU.github.io"
          git add .
          git diff --staged --quiet || git commit -m "docs(${{ github.event.repository.name }}): update from ${{ github.sha }}"
          git push
